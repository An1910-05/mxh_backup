networks:
  mxh_net:
    name: mxh_net
    driver: bridge

services:
  # MySQL chỉ chạy khi bật profile local-db (máy dev / VPS muốn DB trên cùng host).
  # Triển khai VPS + DB tại máy nhà: KHÔNG bật profile này; đặt DB_HOST/... trong .env (xem deploy/VPS.md).
  mysql:
    image: mysql:8.0
    container_name: mxh_mysql
    profiles:
      - local-db
    networks:
      - mxh_net
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-mxh_social}
    ports:
      - "${MYSQL_PUBLISH_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/database/migrations/001_create_tables.sql:/docker-entrypoint-initdb.d/001_create_tables.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        INSTALL_FFMPEG: ${INSTALL_FFMPEG:-false}
    container_name: mxh_backend
    networks:
      - mxh_net
    ports:
      - "${BACKEND_PUBLISH_PORT:-8000}:8000"
    volumes:
      - ./backend/uploads:/app/uploads
    environment:
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-mxh_social}
      DB_USER: ${DB_USER:-root}
      DB_PASS: ${DB_PASS:-root}
      DB_WAIT_TIMEOUT: ${DB_WAIT_TIMEOUT:-120}
      DB_SSL_CA: ${DB_SSL_CA:-}
      DB_SSL_VERIFY: ${DB_SSL_VERIFY:-1}
      JWT_SECRET: ${JWT_SECRET:-mxh-dev-secret-key-2024}
      JWT_EXPIRY: ${JWT_EXPIRY:-86400}
      APP_ENV: ${APP_ENV:-local}
      APP_URL: ${APP_URL:-http://${MXH_PUBLIC_HOST:-localhost}:8000}
      FRONTEND_URL: ${FRONTEND_URL:-http://${MXH_PUBLIC_HOST:-localhost}:5173}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-iPock}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      VNP_TMN_CODE: ${VNP_TMN_CODE:-5UQ9JN3J}
      VNP_HASH_SECRET: ${VNP_HASH_SECRET:-4ADPX1KAMS0N2GKFA834HHVT0A6DELTO}
      VNP_URL: ${VNP_URL:-https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
      MOMO_PARTNER_CODE: ${MOMO_PARTNER_CODE:-MOMO}
      MOMO_ACCESS_KEY: ${MOMO_ACCESS_KEY:-F8BBA842ECF85}
      MOMO_SECRET_KEY: ${MOMO_SECRET_KEY:-K951B6PE1waDMi640xX08PD3vg6EkVlz}
      MOMO_ENDPOINT: ${MOMO_ENDPOINT:-https://test-payment.momo.vn/v2/gateway/api/create}
      BACKEND_URL: ${BACKEND_URL:-http://${MXH_PUBLIC_HOST:-localhost}:8000}
      PAYMENT_MOCK: ${PAYMENT_MOCK:-0}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GHN_API_BASE: ${GHN_API_BASE:-https://online-gateway.ghn.vn/shiip/public-api}
      GHN_TOKEN: ${GHN_TOKEN:-}
      GHN_SHOP_ID: ${GHN_SHOP_ID:-}
    restart: unless-stopped

  websocket:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        INSTALL_FFMPEG: ${INSTALL_FFMPEG:-false}
    container_name: mxh_websocket
    networks:
      - mxh_net
    ports:
      - "${WEBSOCKET_PUBLISH_PORT:-8080}:8080"
    volumes:
      - ./backend/uploads:/app/uploads
    environment:
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-mxh_social}
      DB_USER: ${DB_USER:-root}
      DB_PASS: ${DB_PASS:-root}
      DB_WAIT_TIMEOUT: ${DB_WAIT_TIMEOUT:-120}
      DB_SSL_CA: ${DB_SSL_CA:-}
      DB_SSL_VERIFY: ${DB_SSL_VERIFY:-1}
      JWT_SECRET: ${JWT_SECRET:-mxh-dev-secret-key-2024}
      WS_PORT: 8080
    command: ["php", "bin/websocket-server.php"]
    restart: on-failure
    depends_on:
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mxh_frontend
    networks:
      - mxh_net
    ports:
      - "${FRONTEND_PUBLISH_PORT:-5173}:5173"
    volumes:
      # Mount toàn bộ source code để Vite HMR hot-reload mỗi khi sửa file
      # trên host (dev trên máy cá nhân). `node_modules` dùng named volume
      # để giữ version Linux đã cài trong image, tránh bị đè bởi folder
      # Windows/macOS trên host.
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - ./frontend/uploads:/app/uploads:ro
      - ./frontend/dist:/app/dist:ro
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://${MXH_PUBLIC_HOST:-localhost}:8000}
      VITE_GRAPHQL_URL: ${VITE_GRAPHQL_URL:-http://${MXH_PUBLIC_HOST:-localhost}:8000/graphql}
      VITE_WS_URL: ${VITE_WS_URL:-ws://${MXH_PUBLIC_HOST:-localhost}:8080}
      VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    depends_on:
      - backend
      - websocket

volumes:
  mysql_data:
  backend_vendor:
  frontend_node_modules:
