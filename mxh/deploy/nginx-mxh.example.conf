# Mẫu Nginx — chỉnh domain và đường dẫn chứng chỉ (Let's Encrypt / certbot).
# Proxy tới Docker publish: 127.0.0.1:5173 (frontend), :8000 (API), :8080 (WebSocket Ratchet).

# Frontend (React / Vite)
server {
    listen 443 ssl http2;
    server_name mxh.example.com;

    ssl_certificate     /etc/letsencrypt/live/mxh.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mxh.example.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# REST + GraphQL (không dùng chung cổng với WebSocket — Ratchet chạy process riêng :8080)
server {
    listen 443 ssl http2;
    server_name api.mxh.example.com;

    ssl_certificate     /etc/letsencrypt/live/api.mxh.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.mxh.example.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# WebSocket — subdomain riêng, proxy toàn bộ path tới Ratchet :8080
# Đặt VITE_WS_URL=wss://ws.mxh.example.com
server {
    listen 443 ssl http2;
    server_name ws.mxh.example.com;

    ssl_certificate     /etc/letsencrypt/live/ws.mxh.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ws.mxh.example.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }
}
